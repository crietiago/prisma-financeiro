<script>
/* ============================================================
   V25 Prisma: sistema de orçamento + trilhas + forecast avançado
   Implementado como camada superior para preservar tudo que já foi construído.
   ============================================================ */
(function(){
  function ensureV25(){
    if(!S.data) S.data = {};
    if(!Array.isArray(S.data.budgets)) S.data.budgets = [];
    if(!S.data.forecastScenario) S.data.forecastScenario = {extraSavings:0, purchaseAmount:0, installments:1};
  }
  ensureV25();

  const oldOpenModal = window.openModal;
  const oldRenderModal = window.renderModal;

  window.openModal = function(name, ctx){
    ensureV25();
    if(name === 'addBudget'){
      S.modal = {name, ctx};
      const cur = currentMonth();
      const existing = ctx ? getBudget(cur, ctx) : null;
      modalDraft = {
        month: cur,
        category_id: ctx || 'cat_alimentacao',
        limit: existing ? String(existing.limit||'') : ''
      };
      render();
      return;
    }
    return oldOpenModal(name, ctx);
  };

  window.renderModal = function(){
    if(S.modal && S.modal.name === 'addBudget'){
      const wrap = document.createElement('div');
      wrap.className = 'modal-back';
      wrap.onclick = e => { if(e.target===wrap) closeModal(); };
      wrap.innerHTML = `<div class="modal"><div class="modal-grip"></div>${modalAddBudget()}</div>`;
      document.querySelector('.app').appendChild(wrap);
      return;
    }
    return oldRenderModal();
  };

  window.getBudget = function(month, categoryId){
    ensureV25();
    return S.data.budgets.find(b=>b.month===month && b.category_id===categoryId && b.status!=='inactive');
  };
  window.categorySpent = function(month, categoryId){
    return txOfMonth(month).filter(t=>t.type==='expense' && (t.category_id||'cat_outros')===categoryId).reduce((a,t)=>a+Number(t.amount||0),0);
  };
  window.budgetStatus = function(month, categoryId){
    const b = getBudget(month, categoryId);
    const spent = categorySpent(month, categoryId);
    const limit = b ? Number(b.limit||0) : 0;
    const pct = limit>0 ? Math.min(999,(spent/limit)*100) : 0;
    return {budget:b, spent, limit, pct, remaining:limit-spent};
  };

  window.modalAddBudget = function(){
    const cats = S.data.categories.filter(c=>c.type==='expense');
    return `<h3>Orçamento por categoria</h3><p class="sub">Defina um limite para o mês e acompanhe antes de virar surpresa.</p>
      <div class="field"><label>Mês</label><input type="month" value="${modalDraft.month||currentMonth()}" oninput="modalDraft.month=this.value"></div>
      <div class="field"><label>Categoria</label><div class="pill-row">${cats.map(c=>`<button class="${modalDraft.category_id===c.id?'on':''}" onclick="modalDraft.category_id='${c.id}';render()">${displayIcon(c.icon,'xs')} ${escapeHTML(c.name)}</button>`).join('')}</div></div>
      <div class="field"><label>Limite do mês</label><input type="number" step="0.01" placeholder="Ex: 800" value="${modalDraft.limit||''}" oninput="modalDraft.limit=this.value"></div>
      <div class="note"><b>Isso é planejamento ativo.</b><br>O orçamento não cria gasto. Ele ajuda você a perceber o ritmo antes do fim do mês.</div>
      <button class="btn btn-primary" onclick="saveBudget()">Salvar orçamento</button>
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>`;
  };

  window.saveBudget = function(){
    ensureV25();
    if(!modalDraft.category_id){showToast('Escolha uma categoria');return}
    if(!modalDraft.limit || Number(modalDraft.limit)<=0){showToast('Informe o limite');return}
    const month = modalDraft.month || currentMonth();
    const current = getBudget(month, modalDraft.category_id);
    if(current){ current.limit = Number(modalDraft.limit); }
    else S.data.budgets.push({id:uid(), month, category_id:modalDraft.category_id, limit:Number(modalDraft.limit), status:'active'});
    closeModal();
    showToast('Orçamento salvo');
  };

  window.budgetWidget = function(maxItems=4){
    ensureV25();
    const cur = currentMonth();
    const cats = S.data.categories.filter(c=>c.type==='expense');
    const rows = cats.map(c=>({cat:c, ...budgetStatus(cur,c.id)})).filter(r=>r.budget || r.spent>0).sort((a,b)=>(b.pct||0)-(a.pct||0)).slice(0,maxItems);
    if(rows.length===0){
      return `<div class="finance-card"><div class="ch-row"><b>Orçamento do mês</b><button class="link-btn" onclick="go('budgets',{tab:'more'})">Configurar</button></div><p class="sub">Defina limites por categoria para evitar a surpresa no fim do mês.</p><button class="btn btn-soft btn-sm" onclick="openModal('addBudget')">Criar primeiro orçamento</button></div>`;
    }
    return `<div class="finance-card"><div class="ch-row"><b>Orçamento do mês</b><button class="link-btn" onclick="go('budgets',{tab:'more'})">Ver todos</button></div>
      ${rows.map(r=>{
        const pct = r.limit>0 ? Math.min(100,r.pct) : 0;
        const statusClass = r.pct>=100?'bar-fill-red':r.pct>=80?'bar-fill-amber':'bar-fill-green';
        const msg = r.limit>0 ? (r.remaining>=0 ? `${fmt(r.remaining)} disponíveis` : `${fmt(Math.abs(r.remaining))} acima do limite`) : 'Sem limite definido';
        return `<div class="budget-row"><div class="list-icon" style="background:${r.cat.color}22">${displayIcon(r.cat.icon)}</div><div><span class="list-title">${escapeHTML(r.cat.name)}</span><div class="budget-meta"><span>${fmt(r.spent)} usados</span><span>${r.limit?fmt(r.limit):'sem limite'}</span></div><div class="bar"><span class="${statusClass}" style="width:${pct.toFixed(0)}%"></span></div>${r.pct>=80?`<div class="budget-alert">${r.pct>=100?'Limite ultrapassado.':'Atenção: perto do limite.'} ${msg}</div>`:`<div class="budget-empty">${msg}</div>`}</div><button class="link-btn" onclick="openModal('addBudget','${r.cat.id}')">Editar</button></div>`;
      }).join('')}</div>`;
  };

  window.budgets = function(){
    ensureV25();
    const cur = currentMonth();
    const cats = S.data.categories.filter(c=>c.type==='expense');
    const rows = cats.map(c=>({cat:c, ...budgetStatus(cur,c.id)}));
    root.innerHTML = `<div class="screen dash"><div class="content">
      <div class="page-head"><button class="icon-btn" onclick="go('more')">←</button><div style="flex:1;margin-left:8px"><div class="page-title" style="color:#fff">Orçamento por categoria</div><div class="page-sub">Planeje antes de gastar</div></div><button class="icon-btn" onclick="openModal('addBudget')">＋</button></div>
      <div class="finance-card"><div class="ch-row"><b>${escapeHTML(monthNameLong(cur))}</b><span class="chip chip-purple">Gestão ativa</span></div><p class="sub">Aqui você define quanto pode gastar em cada área da vida. O Prisma acompanha o ritmo para reduzir surpresa e ansiedade.</p></div>
      <div class="finance-card">${rows.map(r=>{
        const pct = r.limit>0 ? Math.min(100,r.pct) : 0;
        const statusClass = r.pct>=100?'bar-fill-red':r.pct>=80?'bar-fill-amber':'bar-fill-green';
        return `<div class="budget-row"><div class="list-icon" style="background:${r.cat.color}22">${displayIcon(r.cat.icon)}</div><div><span class="list-title">${escapeHTML(r.cat.name)}</span><div class="budget-meta"><span>Gasto: ${fmt(r.spent)}</span><span>Limite: ${r.limit?fmt(r.limit):'não definido'}</span></div><div class="bar"><span class="${statusClass}" style="width:${pct.toFixed(0)}%"></span></div></div><button class="link-btn" onclick="openModal('addBudget','${r.cat.id}')">${r.limit?'Editar':'Definir'}</button></div>`;
      }).join('')}</div>
      <div style="height:14px"></div>
    </div>${tabBar('more')}</div>`;
  };

  const TRAILS = {
    divida:{icon:'lifebuoy',title:'Trilha Retomada de Controle',desc:'Pequenos passos para reduzir pressão e voltar a respirar.',steps:[['Registrar uma despesa','Comece enxergando um movimento real.',()=>S.data.transactions.some(t=>t.type==='expense')],['Criar orçamento essencial','Defina limite para uma categoria importante.',()=>S.data.budgets.length>0],['Criar meta de alívio','Uma meta simples para recuperar fôlego.',()=>S.data.goals.length>0]]},
    descontrole:{icon:'search',title:'Trilha Clareza do Mês',desc:'Transforme sensação em visão prática.',steps:[['Registrar entrada e saída','Veja o dinheiro circular.',()=>S.data.transactions.some(t=>t.type==='income')&&S.data.transactions.some(t=>t.type==='expense')],['Definir dois orçamentos','Comece pelas categorias que mais pesam.',()=>S.data.budgets.length>=2],['Ver a projeção','Entenda o que vem pela frente.',()=>true]]},
    estagnado:{icon:'chart',title:'Trilha Evolução Prática',desc:'Saia do automático com metas e limites claros.',steps:[['Criar uma meta','Dê nome ao avanço que você quer.',()=>S.data.goals.length>0],['Definir orçamento do mês','Transforme renda em direção.',()=>S.data.budgets.length>0],['Cadastrar receita planejada','Base para entender sua sobra provável.',()=>S.data.fixedIncomes.length>0]]},
    investidor:{icon:'sprout',title:'Trilha Primeiro Investimento',desc:'Organize a base antes de dar o próximo passo.',steps:[['Criar meta de reserva','Segurança antes de risco.',()=>S.data.goals.some(g=>/reserva|emerg/i.test(g.name||''))||S.data.goals.length>0],['Simular economia mensal','Veja o efeito de pequenos aportes.',()=>Number(S.data.forecastScenario?.extraSavings||0)>0],['Acompanhar orçamento','Evite investir no escuro.',()=>S.data.budgets.length>0]]},
    sonhador:{icon:'rocket',title:'Trilha Projeto de Vida',desc:'Transforme sonho em plano visível.',steps:[['Criar uma meta grande','Dê forma ao que você quer construir.',()=>S.data.goals.length>0],['Registrar primeiro movimento','Todo plano começa com realidade.',()=>S.data.transactions.length>0],['Simular cenário futuro','Veja o impacto das suas escolhas.',()=>Number(S.data.forecastScenario?.extraSavings||0)>0 || Number(S.data.forecastScenario?.purchaseAmount||0)>0]]}
  };
  window.currentTrail = function(){ return TRAILS[S.profile||'descontrole'] || TRAILS.descontrole; };
  window.trailProgress = function(trail){ const done = trail.steps.filter(s=>s[2]()).length; return {done,total:trail.steps.length,pct:(done/trail.steps.length)*100}; };
  window.trailWidget = function(compact=false){
    const trail = currentTrail(); const prog = trailProgress(trail);
    return `<div class="finance-card"><div class="ch-row"><b>Trilha de conquista</b><span class="chip chip-purple">${prog.done}/${prog.total}</span></div>
      <div class="trail-card" style="margin-bottom:0"><div class="trail-head"><div class="trail-icon">${displayIcon(trail.icon)}</div><div><div class="trail-title">${escapeHTML(trail.title)}</div><div class="trail-desc">${escapeHTML(trail.desc)}</div></div></div><div class="bar"><span class="bar-fill-purple" style="width:${prog.pct.toFixed(0)}%"></span></div>
      ${compact?`<div class="unlock-note">Complete pequenos marcos e avance sem sobrecarga.</div>`:`<div style="margin-top:10px">${trail.steps.map(s=>`<div class="milestone ${s[2]()?'done':''}"><div class="milestone-dot">${s[2]()?'✓':'•'}</div><div><b>${escapeHTML(s[0])}</b><span>${escapeHTML(s[1])}</span></div></div>`).join('')}</div>`}</div></div>`;
  };

  window.dashboard = function(){
    ensureV25();
    const cur = currentMonth();
    const sum = monthSummary(cur);
    const p = PROFILE[S.profile]||PROFILE.descontrole;
    const goalsActive = S.data.goals.filter(g=>g.status!=='cancelled' && g.status!=='completed');
    const recent = [...S.data.transactions].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,2);
    const nextAction = !S.data.transactions.length
      ? {title:'Registre seu primeiro movimento',desc:'Comece com uma receita ou um gasto. Só isso já cria clareza.',cta:'Registrar agora',fn:"openModal('addTx')",icon:'receipt'}
      : !S.data.budgets.length
        ? {title:'Defina um limite por categoria',desc:'Orçamento ativo evita surpresa no fim do mês.',cta:'Criar orçamento',fn:"openModal('addBudget')",icon:'target'}
        : !goalsActive.length
          ? {title:'Crie uma meta simples',desc:'Uma meta pequena transforma controle em direção.',cta:'Criar meta',fn:"openModal('addGoal')",icon:'target'}
          : {title:'Simule seu futuro',desc:'Veja como pequenas escolhas mudam os próximos meses.',cta:'Ver futuro',fn:"go('forecast',{tab:'future'})",icon:'chart'};
    root.innerHTML = `<div class="screen dash"><div class="content">
      ${dashHead('Mas já começou a mudar. Um passo claro de cada vez.')}
      <div class="content-light" style="margin-left:-22px;margin-right:-22px;margin-bottom:-22px;padding:18px 16px 8px">
        <div class="finance-card"><div class="ch-row"><b>Saldo do mês</b><span class="chip ${sum.balance>=0?'chip-green':'chip-red'}">${sum.balance>=0?'controle':'atenção'}</span></div><div style="font-family:Sora;font-size:32px;font-weight:800;color:${sum.balance>=0?'#1CBF6C':'#E54B4B'}">${fmt(sum.balance)}</div><p class="sub" style="margin-top:6px">${sum.balance>=0?'Você ainda tem controle.':'Seu mês precisa de uma pausa e direção.'}</p><div class="metric-grid"><div class="metric"><small class="green">Entrou</small><strong class="green">${fmtShort(sum.income)}</strong></div><div class="divider"></div><div class="metric"><small class="red">Saiu</small><strong class="red">${fmtShort(sum.expense)}</strong></div></div></div>
        <div class="finance-card"><div class="ch-row"><b>Hoje você só precisa fazer isso</b></div><div class="list-item" style="border:0;padding:0"><div class="list-icon">${displayIcon(nextAction.icon)}</div><div><span class="list-title">${escapeHTML(nextAction.title)}</span><span class="list-meta">${escapeHTML(nextAction.desc)}</span></div></div><button class="btn btn-primary" style="margin-top:16px" onclick="${nextAction.fn}">${escapeHTML(nextAction.cta)}</button></div>
        ${budgetWidget(3)}
        ${trailWidget(true)}
        ${goalsActive.length?`<div class="finance-card"><div class="ch-row"><b>Metas</b><button class="link-btn" onclick="go('goals',{tab:'goals'})">Ver todas</button></div>${goalsActive.slice(0,2).map(g=>{const pct=goalProgress(g);return `<div class="goal-card" onclick="openModal('goalDetail','${g.id}')"><div class="goal-head"><div class="goal-icon" style="background:${(g.color||'#7552FF')}22">${displayIcon(g.icon||'target')}</div><div class="goal-info"><div class="goal-name">${escapeHTML(g.name)}</div><div class="goal-deadline">${escapeHTML(goalDeadlineText(g))}</div></div></div><div class="bar"><span class="bar-fill-green" style="width:${pct.toFixed(0)}%"></span></div><div class="goal-stats"><span style="color:var(--ink2)">${fmt(g.current_amount||0)} / ${fmt(g.target_amount)}</span><b>${pct.toFixed(0)}%</b></div></div>`}).join('')}</div>`:''}
        <div class="finance-card"><div class="ch-row"><b>Últimos movimentos</b><button class="link-btn" onclick="go('transactions',{tab:'tx'})">Ver todos</button></div>${recent.length?recent.map(renderTxItem).join(''):`<p class="sub">Nada registrado ainda. O primeiro lançamento já começa a trazer clareza.</p>`}</div>
        <div style="height:10px"></div>
      </div>
    </div>${tabBar('home')}</div>`;
  };

  window.goals = function(){
    const active = S.data.goals.filter(g=>g.status!=='completed' && g.status!=='cancelled');
    const completed = S.data.goals.filter(g=>g.status==='completed');
    root.innerHTML = `<div class="screen dash"><div class="content">
      <div class="page-head"><div><div class="page-title" style="color:#fff">Evoluir</div><div class="page-sub">Metas, marcos e constância</div></div><button class="icon-btn" onclick="openModal('addGoal')">＋</button></div>
      ${trailWidget(false)}
      ${S.data.goals.length===0 ? `<div class="finance-card"><div class="empty"><div class="empty-icon">${displayIcon('target')}</div><h4>Nenhuma meta ainda</h4><p>Defina onde você quer chegar. Pode ser uma viagem, uma reserva ou apenas tirar a ansiedade do dinheiro.</p><button class="btn btn-primary btn-sm" onclick="openModal('addGoal')">+ Criar minha primeira meta</button></div></div>` : [active.length>0?`<div class="finance-card"><div class="ch-row"><b>Em andamento</b><span class="chip chip-purple">${active.length}</span></div>${active.map(g=>{const pct=goalProgress(g);return `<div class="goal-card" style="border:0;padding:12px 0;margin:0;border-bottom:1px solid var(--line)" onclick="openModal('goalDetail','${g.id}')"><div class="goal-head"><div class="goal-icon" style="background:${(g.color||'#7552FF')}22">${displayIcon(g.icon||'target')}</div><div class="goal-info"><div class="goal-name">${escapeHTML(g.name)}</div><div class="goal-deadline">${escapeHTML(goalDeadlineText(g))}</div></div></div><div class="bar"><span class="bar-fill-green" style="width:${pct.toFixed(0)}%"></span></div><div class="goal-stats"><span style="color:var(--ink2)">${fmt(g.current_amount||0)} / ${fmt(g.target_amount)}</span><b>${pct.toFixed(0)}%</b></div></div>`}).join('')}</div>`:'', completed.length>0?`<div class="finance-card"><div class="ch-row"><b>Concluídas</b><span class="chip chip-green">${completed.length}</span></div>${completed.map(g=>`<div class="list-item"><div class="list-icon bg-green">${displayIcon(g.icon||'trophy')}</div><div><span class="list-title">${escapeHTML(g.name)}</span><span class="list-meta">Meta atingida</span></div><span class="chip chip-green">100%</span></div>`).join('')}</div>`:''].filter(Boolean).join('')}
      ${S.data.goals.length>0?`<button class="btn btn-soft" onclick="openModal('addGoal')">+ Nova meta</button>`:''}
      <div style="height:14px"></div>
    </div>${tabBar('goals')}</div>`;
  };

  window.more = function(){
    const p = PROFILE[S.profile||'descontrole'];
    const items = [
      {i:'target',t:'Orçamento por categoria',d:'Defina limites mensais e acompanhe o ritmo',action:`go('budgets',{tab:'more'})`},
      {i:'chart',t:'Inteligência de futuro',d:'Simule cenários e decisões antes de agir',action:`go('forecast',{tab:'future'})`},
      {i:'briefcase',t:'Receitas planejadas',d:'Fixas, variáveis e pontuais',action:`go('fixedIncomes')`},
      {i:'receipt',t:'Despesas planejadas',d:'Fixas, variáveis e pontuais',action:`go('fixedExpenses')`},
      {i:'tag',t:'Categorias',d:'Personalize sua organização',action:`go('categories')`},
      {i:'user',t:'Meu perfil',d:`${escapeHTML(p.name)}`,action:`go('result')`},
      {i:'reset',t:'Refazer diagnóstico',d:'Recalibrar seu plano',action:`if(confirm('Refazer o diagnóstico? Suas transações serão preservadas.'))resetDx()`}
    ];
    root.innerHTML = `<div class="screen dash"><div class="content"><div class="page-head"><div><div class="page-title" style="color:#fff">Mais</div><div class="page-sub">Ferramentas para evoluir com calma</div></div></div><div class="finance-card">${items.map(it=>`<div class="list-item" style="cursor:pointer" onclick="${it.action}"><div class="list-icon">${displayIcon(it.i)}</div><div><span class="list-title">${escapeHTML(it.t)}</span><span class="list-meta">${escapeHTML(it.d)}</span></div><span style="color:var(--ink2);font-size:18px">›</span></div>`).join('')}</div><div class="finance-card" style="background:linear-gradient(180deg,#0E0530 0%,#1A0754 100%);color:#fff;border:0;text-align:center"><div style="width:52px;height:52px;margin:0 auto 10px;display:grid;place-items:center">${displayIcon('spark')}</div><h4 style="color:#fff;font-family:Sora;font-size:16px;font-weight:800;margin-bottom:6px">Um passo claro de cada vez.</h4><p style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.55">O Prisma mostra o necessário no momento certo.</p></div><div style="height:14px"></div></div>${tabBar('more')}</div>`;
  };

  window.forecast = function(){
    ensureV25();
    const baseMonths = forecastNext(6);
    const sim = S.data.forecastScenario || {extraSavings:0,purchaseAmount:0,installments:1};
    const extra = Number(sim.extraSavings||0);
    const purchase = Number(sim.purchaseAmount||0);
    const installments = Math.max(1,Number(sim.installments||1));
    const purchasePerMonth = purchase/installments;
    let acc = monthSummary(currentMonth()).balance;
    const months = baseMonths.map((m,idx)=>{
      const purchaseImpact = idx < installments ? purchasePerMonth : 0;
      const balance = m.balance + extra - purchaseImpact;
      acc += balance;
      return {...m, scenarioBalance:balance, scenarioAccumulated:acc, purchaseImpact};
    });
    const baseFinal = baseMonths[baseMonths.length-1].accumulated;
    const scenarioFinal = months[months.length-1].scenarioAccumulated;
    const delta = scenarioFinal-baseFinal;
    root.innerHTML = `<div class="screen dash"><div class="content">
      <div class="page-head"><button class="icon-btn" onclick="go('more')">←</button><div style="flex:1;margin-left:8px"><div class="page-title" style="color:#fff">Inteligência de futuro</div><div class="page-sub">Simule antes de decidir</div></div></div>
      <div class="finance-card scenario-result"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:900">Cenário simulado em ${monthName(months[months.length-1].month)}</div><div style="font-family:Sora;font-size:32px;font-weight:800;margin-top:8px;color:${scenarioFinal>=0?'#43F181':'#FF5B5B'}">${fmt(scenarioFinal)}</div><p class="sub" style="margin-top:6px">${delta>=0?`Melhora de ${fmt(delta)} contra o cenário base.`:`Redução de ${fmt(Math.abs(delta))} contra o cenário base.`}</p></div>
      <div class="finance-card"><div class="ch-row"><b>Simulador de cenários</b><span class="chip chip-purple">Consultor de bolso</span></div><div class="scenario-grid"><div class="scenario-card"><label>E se eu economizar a mais por mês?</label><input type="number" step="0.01" value="${sim.extraSavings||''}" placeholder="Ex: 200" oninput="S.data.forecastScenario.extraSavings=Number(this.value||0);saveState()"></div><div class="scenario-card"><label>E se eu parcelar uma compra?</label><input type="number" step="0.01" value="${sim.purchaseAmount||''}" placeholder="Valor da compra" oninput="S.data.forecastScenario.purchaseAmount=Number(this.value||0);saveState()"></div><div class="scenario-card"><label>Em quantas parcelas?</label><input type="number" min="1" max="24" value="${sim.installments||1}" oninput="S.data.forecastScenario.installments=Math.max(1,Number(this.value||1));saveState()"></div></div><button class="btn btn-primary" style="margin-top:14px" onclick="render()">Atualizar cenário</button><div class="unlock-note">A projeção mistura apenas planejamento, recorrências e faturas futuras. Transações reais continuam separadas.</div></div>
      <div class="finance-card"><div class="ch-row"><b>Mês a mês</b><span class="chip chip-purple">6 meses</span></div>${months.map(f=>`<div class="forecast-row"><span class="forecast-month">${escapeHTML(monthName(f.month))}</span><div><div style="font-size:12px;color:var(--ink2);margin-bottom:4px;display:flex;justify-content:space-between"><span>Base ${fmtShort(f.balance)}</span><span>Simulado ${fmtShort(f.scenarioBalance)}</span></div><div class="bar"><span class="${f.scenarioBalance>=0?'bar-fill-green':'bar-fill-red'}" style="width:${Math.min(100,Math.abs(f.scenarioBalance)/Math.max(1,f.income)*100).toFixed(0)}%"></span></div></div><span class="forecast-amount" style="color:${f.scenarioBalance>=0?'#1CBF6C':'#E54B4B'}">${fmtShort(f.scenarioAccumulated)}</span></div>`).join('')}</div>
      <div style="height:14px"></div>
    </div>${tabBar('future')}</div>`;
  };

  const oldRender = window.render;
  window.render = function(){
    ensureV25();
    const map = {welcome:welcome, auth:authScreen, intro:intro, name:nameScreen, question:question, result:result, setup:setupScreen, dashboard:dashboard, transactions:transactions, cards:cards, goals:goals, more:more, forecast:forecast, fixedExpenses:fixedExpenses, fixedIncomes:fixedIncomes, categories:categories, budgets:budgets};
    (map[S.screen]||welcome)();
    if(S.toast){const t=document.createElement('div');t.className='toast';t.textContent=S.toast;document.querySelector('.app').appendChild(t);}
    if(S.modal) renderModal();
    saveState();
  };

  render();
})();
</script>

<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/service-worker.js").catch(()=>{}));}</script></body>
</html>
