<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07011F">
<title>Prisma Financeiro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#050117;--deep2:#0B032B;--deep3:#1A0754;--purple:#6B45FF;--purple2:#8A63FF;
  --orange:#FFAA2A;--green:#43F181;--cyan:#71F0FF;--red:#FF5B5B;
  --white:#fff;--muted:rgba(255,255,255,.72);--ink:#171334;--ink2:#706B8F;
  --paper:#F8F6FF;--line:#E9E3F7;--shadow:0 24px 70px rgba(5,0,25,.36);
  --glass:rgba(255,255,255,.075);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{min-height:100svh;display:grid;place-items:center;padding:clamp(0px,3vw,28px);font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
  background:
    radial-gradient(circle at 50% 110%,rgba(107,69,255,.46),transparent 34%),
    radial-gradient(circle at 14% 8%,rgba(255,170,42,.10),transparent 24%),
    radial-gradient(circle at 86% 4%,rgba(113,240,255,.13),transparent 24%),
    linear-gradient(155deg,#03000D 0%,#0B032B 48%,#1C0B60 100%);
}
main{width:100%;display:grid;place-items:center}
.app{width:min(100%,430px);min-height:min(820px,100svh);background:#050117;border-radius:30px;overflow:hidden;
  box-shadow:0 34px 100px rgba(0,0,0,.58),0 0 0 1px rgba(139,116,255,.14) inset;
  border:1px solid rgba(255,255,255,.08);isolation:isolate}
.screen{min-height:min(820px,100svh);display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 72% 4%,rgba(138,99,255,.22),transparent 34%),
    radial-gradient(circle at 16% 18%,rgba(255,170,42,.07),transparent 24%),
    linear-gradient(180deg,#050117 0%,#0F0636 42%,#F8F6FF 42%,#F8F6FF 100%)}
.screen::after{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(130deg,rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:180px 180px;opacity:.075;mask-image:linear-gradient(to bottom,#000 0%,transparent 58%)}
.content{position:relative;z-index:2;display:flex;flex-direction:column;min-height:inherit;padding:24px 24px}

/* BRAND */
.brand-glass{display:flex;align-items:center;gap:10px;width:max-content;max-width:100%;
  padding:10px 14px;border-radius:22px;
  background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(18px) saturate(1.2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 18px 46px rgba(0,0,0,.26);
  position:relative;overflow:hidden;
  animation:brandIn .7s cubic-bezier(.2,.8,.2,1) both}
.brand-glass::after{content:'';position:absolute;inset:-40% -20%;pointer-events:none;
  background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.18) 49%,transparent 63%);
  transform:translateX(-120%) rotate(4deg);animation:brandSheen 4.6s ease-in-out infinite}
.brand-logo-full{width:188px;height:auto;display:block;filter:drop-shadow(0 14px 26px rgba(0,0,0,.38))}
.light-beam{position:absolute;left:-18%;top:132px;width:140%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,170,42,.52),rgba(113,240,255,.62),transparent);
  box-shadow:0 0 18px rgba(113,240,255,.28);
  transform:rotate(14deg);opacity:.42;
  animation:beam 5.5s ease-in-out infinite alternate;z-index:1}

/* HERO (welcome) */
.hero{padding-top:16px;text-align:center;color:#fff;align-items:center;justify-content:flex-start}
.hero .brand-glass{margin:0 auto 64px}
.hero h1{font-family:'Sora',sans-serif;font-size:29px;line-height:1.13;font-weight:800;
  letter-spacing:-.055em;margin-bottom:14px;max-width:360px;text-wrap:balance;
  text-shadow:0 10px 30px rgba(0,0,0,.28)}
.hero h1 strong{display:block;color:var(--orange);text-shadow:0 0 24px rgba(255,165,30,.3)}
.hero p{font-size:15.5px;line-height:1.65;color:rgba(255,255,255,.76);max-width:320px;margin:0 auto}
.hero-card{margin-top:auto;background:linear-gradient(180deg,#FFFFFF 0%,#FBFAFF 100%);color:var(--ink);
  border-radius:32px 32px 0 0;padding:26px 22px 28px;
  border:1px solid rgba(233,227,247,.85);box-shadow:0 -24px 70px rgba(0,0,0,.22)}

.step-row{display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,.82);
  font-size:13px;font-weight:900;margin:30px 0 12px;width:100%}
.progress{height:7px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;width:100%}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--purple2));
  border-radius:inherit;transition:width .55s cubic-bezier(.2,.8,.2,1)}

.kicker{font-size:11px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#E89414;margin-bottom:10px}
h2{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:-.045em;color:var(--ink)}
.sub{font-size:14.5px;color:#625D80;line-height:1.65}

.btn{width:100%;border:0;border-radius:17px;padding:16px;font-family:'Nunito',sans-serif;
  font-size:15px;font-weight:900;cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease,opacity .18s ease}
.btn-primary{background:linear-gradient(135deg,#7552FF 0%,#3A16C9 100%);color:#fff;
  box-shadow:0 16px 34px rgba(75,36,210,.34)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 18px 42px rgba(75,36,210,.42)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.42;cursor:not-allowed;box-shadow:none}
.ghost{background:transparent;color:#5F35FF;margin-top:12px}
.btn-soft{background:rgba(107,69,255,.08);color:#5F35FF;border:1px solid rgba(107,69,255,.18)}
.btn-soft:hover{background:rgba(107,69,255,.14)}
.btn-danger{background:linear-gradient(135deg,#FF5B5B,#C83434);color:#fff;box-shadow:0 12px 26px rgba(200,52,52,.3)}
.btn-sm{padding:11px 14px;font-size:13px;border-radius:13px;width:auto}

.top{display:flex;align-items:center;gap:12px;margin-bottom:24px;color:#fff}
.back{width:38px;height:38px;border-radius:13px;background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.13);color:#fff;font-size:18px;cursor:pointer;
  backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}

.form-card,.question-card,.result-card{background:#fff;border-radius:28px;padding:24px 22px;
  border:1px solid rgba(233,227,247,.85);box-shadow:0 20px 56px rgba(23,19,52,.11)}
.input{width:100%;padding:16px 18px;border:1.5px solid var(--line);border-radius:16px;
  font-size:16px;outline:0;color:var(--ink);background:#fff;margin:22px 0 18px;font-family:inherit}
.input:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,165,30,.14)}
.note{margin-top:18px;padding:15px 16px;border-radius:18px;
  background:linear-gradient(135deg,#F2EEFF,#FFF8EC);border:1px solid var(--line);
  font-size:13.5px;line-height:1.55;color:#625D80}

/* OPTIONS (intro + diagnóstico) */
.options{display:grid;gap:10px;margin-top:18px}
.opt{width:100%;border:1.5px solid #ECE7F6;background:linear-gradient(180deg,#FFFFFF 0%,#FDFBFF 100%);
  border-radius:20px;padding:15px;display:grid;grid-template-columns:42px 1fr 24px;gap:12px;
  align-items:center;text-align:left;cursor:pointer;font-family:inherit;
  transition:border-color .16s ease,background .16s ease,box-shadow .16s ease,transform .16s ease}
.opt:hover{transform:translateY(-1px);border-color:rgba(107,69,255,.28);box-shadow:0 10px 24px rgba(23,19,52,.055)}
.opt.selected{border-color:rgba(255,170,42,.72);
  background:linear-gradient(135deg,#FFF8E9 0%,#FFFFFF 74%);
  box-shadow:0 12px 28px rgba(255,170,42,.14);transform:none}
.opt-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
  background:linear-gradient(135deg,#F3EFFF,#EAE3FF);font-size:20px}
.opt-title{display:block;font-size:14.2px;font-weight:900;color:var(--ink);line-height:1.28}
.opt-desc{display:block;font-size:12.4px;color:var(--ink2);line-height:1.35;margin-top:3px}
.radio{width:22px;height:22px;border-radius:50%;border:2px solid #D8D4E6;
  display:grid;place-items:center;color:#fff;font-size:12px;background:#fff}
.selected .radio{background:var(--orange);border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,170,42,.14)}

.transition-box{margin:16px auto 0;max-width:342px;padding:18px 20px;border-radius:22px;
  background:linear-gradient(180deg,rgba(12,4,42,.92),rgba(7,1,25,.88));
  border:1px solid rgba(255,255,255,.12);color:#fff;text-align:center;
  box-shadow:0 18px 44px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(16px) saturate(1.15);
  animation:softIn .32s ease both}
.transition-box b{display:block;font-size:17px;line-height:1.35;color:rgba(255,255,255,.88);font-weight:700}
.transition-box span{display:block;margin-top:6px;font-family:'Sora',sans-serif;
  font-size:18px;line-height:1.28;color:#fff;font-weight:800;letter-spacing:-.035em}


/* PERFIL FINANCEIRO (arquétipo) */
.profile-pill{display:inline-flex;align-items:center;gap:8px;margin:8px auto 14px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.86);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(14px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.profile-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#6B45FF,#71F0FF,#43F181,#FFAA2A);box-shadow:0 0 16px rgba(113,240,255,.5)}
.profile-name{font-family:'Sora',sans-serif;font-size:30px;line-height:1.08;font-weight:800;letter-spacing:-.055em;color:#fff;margin-bottom:10px;text-shadow:0 10px 30px rgba(0,0,0,.28)}
.profile-name span{color:var(--orange);text-shadow:0 0 24px rgba(255,165,30,.3)}
.profile-disclaimer{margin:14px auto 0;max-width:320px;color:rgba(255,255,255,.58)!important;font-size:12.5px!important;line-height:1.5!important}
.profile-summary{margin:18px 0 6px;padding:16px 16px;border-radius:20px;background:linear-gradient(135deg,#F5F1FF,#FFF8EC);border:1px solid var(--line);font-size:13.5px;line-height:1.55;color:#625D80}
.profile-summary b{display:block;color:var(--ink);font-family:'Sora',sans-serif;font-size:15px;margin-bottom:4px;letter-spacing:-.025em}

/* RESULT */
.result-hero{text-align:center;color:#fff;padding-top:8px}
.result-icon{width:76px;height:76px;margin:0 auto 16px;border-radius:26px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;font-size:34px;
  backdrop-filter:blur(14px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 18px 44px rgba(0,0,0,.22)}
.result-hero h2{color:#fff;font-size:26px;line-height:1.14;margin-bottom:10px}
.result-hero p{color:rgba(255,255,255,.72);font-size:15px;line-height:1.6}
.result-card{margin-top:22px;background:linear-gradient(180deg,#FFFFFF 0%,#FBFAFF 100%)}
.plan-list{display:grid;gap:12px;margin:18px 0 22px}
.plan-item{display:grid;grid-template-columns:30px 1fr;gap:12px;align-items:start}
.plan-num{width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#6E43FF,#2D0BB8);color:#fff;
  display:grid;place-items:center;font-weight:900;font-size:13px}
.plan-item b{font-size:14.5px;color:var(--ink)}
.plan-item span{font-size:12.8px;color:var(--ink2);line-height:1.45}

/* DASHBOARD (geral) */
.dash{background:#F8F6FF;color:var(--ink)}
.dash::before{background:linear-gradient(180deg,#050117 0%,#10063A 41%,#F8F6FF 41%,#F8F6FF 100%)}
.dash-head{color:#fff;padding-bottom:18px}
.dash-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.045em;margin-top:24px}
.dash-sub{color:rgba(255,255,255,.72);font-size:14px;margin-top:6px}

.finance-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;
  box-shadow:0 14px 38px rgba(23,19,52,.09);margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:1fr 1px 1fr;gap:14px;margin-top:14px}
.divider{background:var(--line)}
.metric small{display:block;font-weight:900;margin-bottom:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.metric strong{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;display:block}
.green{color:#1CBF6C}
.red{color:#E54B4B}
.purple{color:#5F35FF}
.amber{color:#E89414}

/* TABS BOTTOM */
.tabs{margin-top:auto;display:flex;background:#fff;border-radius:26px 26px 0 0;
  box-shadow:0 -12px 35px rgba(45,43,107,.12);padding:8px 8px 4px;
  border:1px solid rgba(233,227,247,.9);border-bottom:0;
  position:relative;z-index:4}
.tab{flex:1;background:transparent;border:0;color:#8F8AA8;font-size:11px;font-weight:900;
  padding:8px 0;cursor:pointer;font-family:inherit;border-radius:14px;transition:color .18s ease,background .18s ease}
.tab:hover{background:rgba(107,69,255,.04)}
.tab.on{color:#5F35FF;background:rgba(107,69,255,.07)}
.tic{display:block;font-size:19px;margin-bottom:2px}

/* HEADER PAGE (telas internas) */
.page-head{display:flex;align-items:center;justify-content:space-between;color:#fff;margin-bottom:18px;padding-top:8px}
.page-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.04em}
.page-sub{font-size:13px;color:rgba(255,255,255,.66);margin-top:4px}
.icon-btn{width:38px;height:38px;border-radius:13px;background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.13);color:#fff;font-size:18px;cursor:pointer;
  display:grid;place-items:center;backdrop-filter:blur(12px)}
.icon-btn:hover{background:rgba(255,255,255,.12)}

/* LIST ITEM (transações, cartões, metas, etc) */
.list-item{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:0}
.list-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:18px;
  background:linear-gradient(135deg,#F3EFFF,#EAE3FF)}
.list-icon.bg-green{background:linear-gradient(135deg,#E0FBE8,#C5F3D2)}
.list-icon.bg-red{background:linear-gradient(135deg,#FEE7E7,#FDD0D0)}
.list-icon.bg-amber{background:linear-gradient(135deg,#FFF1D4,#FFE2A6)}
.list-icon.bg-cyan{background:linear-gradient(135deg,#E2F8FC,#C2EFF6)}
.list-title{font-size:14.5px;font-weight:900;color:var(--ink);line-height:1.25;display:block}
.list-meta{font-size:12.5px;color:var(--ink2);margin-top:3px;display:block;line-height:1.4}
.list-amount{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;text-align:right}

/* CHIPS & TAGS */
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;
  font-size:11.5px;font-weight:900;letter-spacing:.04em}
.chip-green{background:#E0FBE8;color:#1CBF6C}
.chip-red{background:#FEE7E7;color:#E54B4B}
.chip-purple{background:rgba(107,69,255,.1);color:#5F35FF}
.chip-amber{background:#FFF1D4;color:#E89414}

/* PROGRESS BAR (metas, orçamento) */
.bar{height:9px;background:#EFE8FE;border-radius:999px;overflow:hidden;margin-top:8px}
.bar > span{display:block;height:100%;border-radius:inherit;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.bar-fill-purple{background:linear-gradient(90deg,#7552FF,#3A16C9)}
.bar-fill-green{background:linear-gradient(90deg,#43F181,#1CBF6C)}
.bar-fill-amber{background:linear-gradient(90deg,#FFAA2A,#E89414)}
.bar-fill-red{background:linear-gradient(90deg,#FF5B5B,#C83434)}

/* MODAL */
.modal-back{position:absolute;inset:0;background:rgba(5,1,25,.66);backdrop-filter:blur(8px);
  z-index:50;display:grid;place-items:end center;animation:softIn .25s ease both}
.modal{width:100%;max-width:430px;background:#fff;border-radius:26px 26px 0 0;
  padding:22px 22px 26px;border-top:1px solid var(--line);
  box-shadow:0 -22px 60px rgba(0,0,0,.36);
  animation:slideUp .32s cubic-bezier(.2,.8,.2,1) both;max-height:90%;overflow-y:auto}
.modal-grip{width:42px;height:4px;border-radius:99px;background:#D8D4E6;margin:0 auto 14px}
.modal h3{font-family:'Sora',sans-serif;font-size:19px;font-weight:800;color:var(--ink);
  letter-spacing:-.035em;margin-bottom:6px}
.modal p.sub{margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:900;color:var(--ink2);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;padding:13px 14px;border:1.5px solid var(--line);
  border-radius:13px;font-size:15px;outline:0;background:#fff;color:var(--ink);font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,165,30,.14)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.toggle{display:flex;background:#F2EEFF;border-radius:13px;padding:4px;gap:4px}
.toggle button{flex:1;border:0;background:transparent;padding:10px;border-radius:10px;
  font-size:13px;font-weight:800;color:#625D80;cursor:pointer;font-family:inherit;
  transition:background .16s ease,color .16s ease}
.toggle button.on{background:#fff;color:#5F35FF;box-shadow:0 4px 12px rgba(45,30,90,.08)}

/* ICON GRID (escolher ícone) */
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.icon-grid button{border:1.5px solid var(--line);background:#fff;border-radius:11px;
  font-size:18px;padding:9px 0;cursor:pointer;transition:all .15s;display:grid;place-items:center}
.icon-grid button.on{border-color:var(--orange);background:#FFF8E9;
  box-shadow:0 4px 12px rgba(255,170,42,.18)}

/* PILL ROW (categorias) */
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pill-row button{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:800;
  border:1.5px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer;font-family:inherit;
  transition:all .15s}
.pill-row button.on{border-color:#5F35FF;background:rgba(107,69,255,.08);color:#5F35FF}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 16px}
.empty-icon{width:62px;height:62px;border-radius:20px;margin:0 auto 14px;
  background:linear-gradient(135deg,#F3EFFF,#EAE3FF);display:grid;place-items:center;font-size:28px}
.empty h4{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--ink);margin-bottom:4px}
.empty p{font-size:13.5px;color:var(--ink2);max-width:280px;margin:0 auto 16px;line-height:1.55}

/* CARD HEADERS */
.ch-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ch-row b{font-family:'Sora',sans-serif;font-size:15.5px;font-weight:800;letter-spacing:-.025em;color:var(--ink)}
.link-btn{background:transparent;border:0;color:#5F35FF;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;padding:6px 8px;border-radius:9px}
.link-btn:hover{background:rgba(107,69,255,.06)}

/* CARTÃO DE CRÉDITO VISUAL */
.cc-card{border-radius:22px;padding:18px 18px 16px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#5F35FF,#2D0BB8);
  box-shadow:0 18px 44px rgba(75,36,210,.36)}
.cc-card.alt{background:linear-gradient(135deg,#0E1450,#3A16C9)}
.cc-card.warm{background:linear-gradient(135deg,#E89414,#A85F0E)}
.cc-card.dark{background:linear-gradient(135deg,#171334,#3A2D72)}
.cc-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% -10%,rgba(255,255,255,.18),transparent 40%);pointer-events:none}
.cc-bank{font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
.cc-name{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;margin-top:4px;letter-spacing:-.025em}
.cc-amount{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;margin-top:14px;letter-spacing:-.025em}
.cc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11.5px;opacity:.85;font-weight:700}

/* META CARD */
.goal-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}

function txOfMonth(key){
  return S.data.transactions.filter(t=>t.date && t.date.slice(0,7)===key);
}

function monthSummary(key){
  const tx = txOfMonth(key);
  let income = 0, expense = 0;
  tx.forEach(t=>{
    if(t.type==='income') income += Number(t.amount||0);
    else expense += Number(t.amount||0);
  });
  return {income, expense, balance: income-expense, count: tx.length};
}

function categoryBreakdown(key){
  const tx = txOfMonth(key).filter(t=>t.type==='expense');
  const by = {};
  tx.forEach(t=>{
    const cid = t.category_id || 'cat_outros';
    by[cid] = (by[cid]||0) + Number(t.amount||0);
  });
  const total = Object.values(by).reduce((a,b)=>a+b,0);
  return Object.entries(by)
    .map(([cid,val])=>{
      const c = findCat(cid);
      return {id:cid, name:c.name, icon:c.icon, color:c.color, value:val, pct: total>0 ? (val/total)*100 : 0};
    })
    .sort((a,b)=>b.value-a.value);
}

function ccInvoice(cardId, key){
  /* Soma das transações de cartão no mês de competência */
  const tx = S.data.transactions.filter(t=>t.payment_method===cardId && t.type==='expense');
  let total = 0;
  tx.forEach(t=>{
    const installments = Math.max(1, Number(t.installments||1));
    const perInstallment = Number(t.amount||0) / installments;
    /* Distribuir parcelas a partir do mês de compra */
    const baseDate = new Date(t.date+'T00:00:00');
    for(let i=0;i<installments;i++){
      const d = new Date(baseDate.getFullYear(), baseDate.getMonth()+i, 1);
      if(monthKey(d)===key) total += perInstallment;
    }
  });
  return total;
}

function ccTotalUsed(cardId){
  /* Limite usado: parcelas em aberto a partir do mês corrente */
  const cur = currentMonth();
  let total = 0;
  S.data.transactions.filter(t=>t.payment_method===cardId && t.type==='expense').forEach(t=>{
    const installments = Math.max(1, Number(t.installments||1));
    const perInstallment = Number(t.amount||0) / installments;
    const baseDate = new Date(t.date+'T00:00:00');
    for(let i=0;i<installments;i++){
      const d = new Date(baseDate.getFullYear(), baseDate.getMonth()+i, 1);
      if(monthKey(d) >= cur) total += perInstallment;
    }
  });
  return total;
}

function projectMonth(key){
  /* Projeção: receitas fixas + despesas fixas + recorrências do mês */
  let income = 0, expense = 0;
  S.data.fixedIncomes.filter(f=>f.status!=='inactive').forEach(f=>{
    income += Number(f.amount||0);
  });
  S.data.fixedExpenses.filter(f=>f.status!=='inactive').forEach(f=>{
    expense += Number(f.amount||0);
  });
  /* Cartões: faturas projetadas */
  S.data.creditCards.filter(c=>c.status!=='inactive').forEach(c=>{
    expense += ccInvoice(c.id, key);
  });
  return {income, expense, balance: income-expense};
}

function forecastNext(months=6){
  const out = [];
  const base = new Date();
  base.setDate(1);
  let acc = monthSummary(currentMonth()).balance;
  for(let i=1;i<=months;i++){
    const d = new Date(base.getFullYear(), base.getMonth()+i, 1);
    const k = monthKey(d);
    const proj = projectMonth(k);
    acc += proj.balance;
    out.push({month:k, income:proj.income, expense:proj.expense, balance:proj.balance, accumulated:acc});
  }
  return out;
}

function goalProgress(g){
  return g.target_amount>0 ? Math.min(100,(Number(g.current_amount||0)/Number(g.target_amount))*100) : 0;
}

function goalDeadlineText(g){
  if(!g.deadline) return 'Sem prazo';
  const d = new Date(g.deadline+'T00:00:00');
  const now = new Date();
  const diff = Math.ceil((d - now) / (1000*60*60*24));
  if(diff < 0) return 'Atrasada';
  if(diff === 0) return 'Hoje';
  if(diff < 30) return `${diff} dias restantes`;
  const months = Math.round(diff/30);
  return `${months} ${months===1?'mês':'meses'} restantes`;
}

}

function pushScreen(screen, opts={}){
  if(opts.tab!==undefined) S.tab = opts.tab;
  if(S.screen && S.screen !== screen && !opts.replace){
    S.navStack = S.navStack || [];
    S.navStack.push({screen:S.screen, tab:S.tab, qi:S.qi, sel:S.sel});
    if(S.navStack.length > 30) S.navStack.shift();
  }
  S.screen = screen;
  render();
}
function go(screen, opts={}){
  pushScreen(screen, opts);
}
function goHome(){
  S.navStack = [];
  S.skipDx = false;
  S.screen = 'welcome';
  S.tab = 'home';
  render();
}
function goDashboard(tab='home'){
  S.navStack = [];
  S.screen = 'dashboard';
  S.tab = tab;
  render();
}
function goBack(fallback){
  if(S.modal){S.modal=null; render(); return;}
  const stack = S.navStack || [];
  if(stack.length){
    const prev = stack.pop();
    S.screen = prev.screen || fallback || 'welcome';
    if(prev.tab!==undefined) S.tab = prev.tab;
    if(prev.qi!==undefined) S.qi = prev.qi;
    if(prev.sel!==undefined) S.sel = prev.sel;
  }else{
    S.screen = fallback || (S.data && S.data.onboarded ? 'dashboard' : 'welcome');
    if(S.screen === 'dashboard') S.tab = S.tab || 'home';
  }
  render();
}
function preventBrowserExit(){
  try{
    history.replaceState({prisma:true}, '', location.href);
    history.pushState({prisma:true}, '', location.href);
    window.addEventListener('popstate', function(){
      goBack(S.data && S.data.onboarded ? 'dashboard' : 'welcome');
      history.pushState({prisma:true}, '', location.href);
    });
  }catch(e){}
}

function startConversion(){
  /* Conversão correta: primeiro gera valor, depois pede cadastro. */
  S.postAuth = 'savePlan';
  S.authMode = 'signup';
  S.isAuthed = false;
  S.skipDx = false;
  S.intro = '';
  S.qi = 0;
  S.sel = null;
  S.answers = {};
  S.scores = {divida:0,descontrole:0,estagnado:0,investidor:0,sonhador:0};
  go('intro');

function startAuth(next){
  S.postAuth = next || 'intro';
  S.authMode = next === 'direct' ? 'login' : 'signup';
  go('auth');
}
function goIntro(){go('intro')}
function afterAuth(){
  S.isAuthed = true;
  if(S.postAuth==='direct'){
    skipDx();
  }else if(S.postAuth==='savePlan'){
    enterDashboard();
  }else{
    goIntro();

function socialAuth(provider){
  S.isAuthed = true;
  S.userEmail = provider.toLowerCase() + '@acesso.prisma';
  showToast('Acesso com ' + provider + ' realizado');
  setTimeout(()=>afterAuth(), 350);
}
function submitAuth(){
  const email = (document.getElementById('authEmail')?.value || '').trim();
  const pass = (document.getElementById('authPass')?.value || '').trim();
  const nm = (document.getElementById('authName')?.value || '').trim();
  if(S.authMode==='signup' && !nm){showToast('Informe seu nome para criar a conta');return}
  if(!email || !email.includes('@')){showToast('Informe um e-mail válido');return}
  if(pass.length < 4){showToast('Informe uma senha com pelo menos 4 caracteres');return}
  S.userEmail = email;
  if(nm) S.name = nm;
  afterAuth();
}

function skipDx(){
  /* Pular diagnóstico: criar perfil padrão e ir para tela de nome */
  S.intro = 'descontrole';
  S.profile = 'descontrole';
  S.scores = {divida:0,descontrole:1,estagnado:0,investidor:0,sonhador:0};

  root.innerHTML = `<div class="screen hero"><div class="light-beam" aria-hidden="true"></div><div class="content"><div class="top"><button class="back" onclick="goHome()">←</button><div style="flex:1" class="progress"><span style="width:20%"></span></div><span style="font-size:12px;font-weight:900;color:rgba(255,255,255,.72)">1 / 5</span></div>${BRAND}<h1 style="margin-top:30px">Antes dos números,<strong>vamos entender seu momento.</strong></h1><p>Uma leitura simples para transformar confusão em direção.</p><div class="hero-card fi"><div class="kicker">Comece por aqui</div><h2 style="font-size:24px;line-height:1.2;margin-bottom:10px">Qual dessas situações mais parece com você hoje?</h2><p class="sub" style="margin-bottom:18px">Não precisa acertar. Escolha apenas o que mais se aproxima.</p><div class="options">${INTRO_OPTIONS.map(o=>`<button class="opt ${S.intro===o.id?'selected':''}" onclick="selectIntro(this,'${o.id}')"><span class="opt-icon">${displayIcon(o.icon)}</span><span><span class="opt-title">${escapeHTML(o.title)}</span><span class="opt-desc">${escapeHTML(o.desc)}</span></span><span class="radio">${S.intro===o.id?'✓':''}</span></button>`).join('')}</div><button class="btn btn-primary" style="margin-top:18px" onclick="goName()" ${!S.intro?'disabled':''}>Começar com clareza →</button><button class="btn ghost" onclick="skipDx()">Responder depois</button></div></div></div>`;

function selectIntro(el,id){
  S.intro = id;
  const box = el.closest('.hero-card') || document;
  box.querySelectorAll('.opt').forEach(btn=>{
    btn.classList.remove('selected');
    const radio = btn.querySelector('.radio');
    if(radio) radio.textContent = '';
  });
  el.classList.add('selected');
  const selectedRadio = el.querySelector('.radio');
  if(selectedRadio) selectedRadio.textContent = '✓';
  const cta = box.querySelector('.btn-primary');
  if(cta) cta.disabled = false;
}
function goName(){if(!S.intro)S.intro='descontrole';S.skipDx=false;S.scores[S.intro]+=1;go('name')}

function nameScreen(){
  const isSkip = !!S.skipDx;
  const progressPct = isSkip ? 60 : 32;
  const progressLabel = isSkip ? '' : '2 / 5';
  const noteHTML = isSkip
    ? `<div class="note"><b style="color:var(--ink)">Você pode fazer o diagnóstico depois</b><br>A qualquer momento, em <b>Mais → Refazer diagnóstico</b>, você recebe um plano personalizado.</div>`
    : `<div class="note"><b style="color:var(--ink)">Por que responder?</b><br>São perguntas rápidas para entender seu momento financeiro e indicar o próximo passo com mais clareza.</div>`;
  const ctaText = isSkip ? 'Entrar no Prisma →' : 'Quero organizar minha vida financeira';

  root.innerHTML = `<div class="screen"><div class="light-beam" aria-hidden="true"></div><div class="content si"><div class="top"><button class="back" onclick="S.skipDx=false;goHome()">←</button><div style="flex:1" class="progress"><span style="width:${progressPct}%"></span></div>${progressLabel?`<span style="font-size:12px;font-weight:900;color:rgba(255,255,255,.72)">${progressLabel}</span>`:''}</div>${BRAND}<div style="height:54px"></div><div class="form-card"><div class="kicker">Personalização</div><h2 style="font-size:25px;line-height:1.2;margin-bottom:10px">Como podemos te chamar?</h2><p class="sub">Vamos montar uma jornada que conversa com você, no seu momento e no seu ritmo.</p><input class="input" id="ni" placeholder="Seu nome" value="${escapeHTML(S.name)}" oninput="S.name=this.value"><button class="btn btn-primary" onclick="${ctaAction}">${ctaText}</button>${noteHTML}</div></div></div>`;
}

function enterAfterSkip(){
  S.name = (S.name||'').trim() || 'você';
  S.skipDx = false;
  enterDashboard();
}

function startDx(){S.name=(S.name||'').trim()||'você';S.qi=0;S.sel=null;S.answers={};go('question')}

function question(){
  const q = QUESTIONS[S.qi];
  const selected = S.answers[S.qi];
  root.innerHTML = `<div class="screen"><div class="content si"><div class="top"><button class="back" onclick="backQ()">←</button><div style="flex:1" class="progress"><span style="width:${((S.qi+1)/QUESTIONS.length)*100}%"></span></div><span style="font-size:12px;font-weight:900;color:rgba(255,255,255,.72)">${progressText()}</span></div><div class="question-card"><div class="kicker">Diagnóstico financeiro</div><h2 style="font-size:22px;line-height:1.24;margin-bottom:8px">${escapeHTML(q.q)}</h2><p class="sub">${escapeHTML(q.helper)}</p><div class="options">${q.o.map((o,i)=>`<button class="opt ${selected===i?'selected':''}" onclick="pick(this,${i})"><span class="opt-icon">${displayIcon(o.i)}</span><span><span class="opt-title">${escapeHTML(o.t)}</span><span class="opt-desc">${escapeHTML(o.d)}</span></span><span class="radio">${selected===i?'✓':''}</span></button>`).join('')}</div></div>${selected!==undefined?microTransition(q.o[selected].p):''}<button class="btn btn-primary" style="margin-top:16px" onclick="nextQ()" ${selected===undefined?'disabled':''}>${S.qi<QUESTIONS.length-1?'Próxima pergunta →':'Ver meu perfil →'}</button></div></div>`;
}

function microTransition(p){
  const map = {
    divida:['Você não precisa de mais esforço agora.','Precisa de direção.'],
    descontrole:['Seu problema não é falta de dinheiro.','É falta de clareza.'],
    estagnado:['Você já faz muito.','Só falta um caminho melhor.'],
    investidor:['Você não precisa saber tudo.','Só precisa começar certo.'],
    sonhador:['Você não quer só dinheiro.','Você quer liberdade.']
  };
  return `<div class="transition-box"><b>${map[p][0]}</b><span>${map[p][1]}</span></div>`;
}


function pick(el,i){
  const q = QUESTIONS[S.qi];
  S.answers[S.qi] = i;
  S.sel = i;

  const content = el.closest('.content') || document;
  content.querySelectorAll('.question-card .opt').forEach(btn=>{
    btn.classList.remove('selected');
    const radio = btn.querySelector('.radio');
    if(radio) radio.textContent = '';
  });

  el.classList.add('selected');
  const selectedRadio = el.querySelector('.radio');
  if(selectedRadio) selectedRadio.textContent = '✓';

  const oldBox = content.querySelector('.transition-box');
  if(oldBox) oldBox.remove();

  const nextButton = content.querySelector('.btn-primary');
  const wrap = document.createElement('div');
  wrap.innerHTML = microTransition(q.o[i].p).trim();
  const transition = wrap.firstElementChild;
  if(nextButton && transition){
    content.insertBefore(transition, nextButton);
    nextButton.disabled = false;
  }
}
function nextQ(){if(S.answers[S.qi]===undefined)return; if(S.qi<QUESTIONS.length-1){S.qi++;S.sel=S.answers[S.qi]??null;render();return} calculateProfile();go('result')}
function backQ(){if(S.qi>0){S.qi--;S.sel=S.answers[S.qi]??null;render()}else{goBack('name')}}
function calculateProfile(){
  S.scores = {divida:0,descontrole:0,estagnado:0,investidor:0,sonhador:0};
  if(S.intro) S.scores[S.intro] += 1;
  Object.entries(S.answers).forEach(([idx,ans])=>{const p = QUESTIONS[idx].o[ans].p; S.scores[p]+=1});
  S.profile = Object.entries(S.scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function result(){
  const p = PROFILE[S.profile] || PROFILE.descontrole;
  root.innerHTML = `<div class="screen"><div class="content fi"><div class="result-hero">${BRAND}<div style="height:30px"></div><div class="result-icon">${displayIcon(p.icon,'lg')}</div><div class="profile-pill">Seu perfil financeiro</div><div class="profile-name">Você está <span>${escapeHTML(p.name)}</span></div><p>${escapeHTML(p.desc)}</p><p class="profile-disclaimer">Esse não é um rótulo. É só um ponto de partida para organizar sua próxima decisão.</p></div><div class="result-card"><div class="profile-summary"><b>${escapeHTML(p.title)}</b>${escapeHTML(p.summary || p.sub)}</div><h2 style="font-size:20px;margin-bottom:6px">Agora vamos montar um plano que faz sentido pra você.</h2><p class="sub">Sem fórmulas genéricas. Sem complicação.</p><div class="plan-list">${p.steps.map((s,i)=>`<div class="plan-item"><span class="plan-num">${i+1}</span><span><b>${escapeHTML(s[0])}</b><br><span>${escapeHTML(s[1])}</span></span></div>`).join('')}</div><button class="btn btn-primary" onclick="savePlanGate()">Salvar meu plano →</button><button class="btn ghost" onclick="enterDashboard()">Ver sem salvar</button><button class="btn ghost" onclick="resetDx()">Refazer diagnóstico</button></div></div></div>`;
}

function savePlanGate(){
  /* Gate no momento certo: depois que o usuário já recebeu valor. */
  S.postAuth = 'savePlan';
  S.authMode = 'signup';
  try{ localStorage.setItem('prisma_temp_plan', JSON.stringify({name:S.name,intro:S.intro,answers:S.answers,scores:S.scores,profile:S.profile,data:S.data})); }catch(e){}
  go('auth');
}

function nval(id){
  const raw=(document.getElementById(id)?.value||'').replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,'');
  return Number(raw||0);
}
function saveSetup(){
  const income=nval('setupIncome');
  const expName=(document.getElementById('setupExpenseName')?.value||'').trim();
  const cur=monthKey();

  /* Regra de UX/financeiro:
     dados do começo guiado não viram transação.
     renda mensal entra apenas como base de projeção recorrente;
     maior gasto entra apenas como foco de atenção, sem valor e sem impacto em saldo/projeção. */
  if(income>0){
    const already = S.data.fixedIncomes.some(f=>f.name==='Renda mensal' && f.start_month===cur);
    if(!already){
      S.data.fixedIncomes.push({id:uid(),name:'Renda mensal',amount:income,type:'fixed',start_month:cur,category_id:'cat_salario'});
    }
  }
  if(expName){
    S.data.prefs.focusExpenseName = expName;
  }

  S.data.setupDone=true;
  goDashboard('home');
  showToast('Seu ponto de partida foi criado sem lançar transações');
}
function skipSetup(){
  S.data.setupDone=true;
  goDashboard('home');
}

  S.intro=null; S.answers={}; S.qi=0; S.sel=null; S.profile=null; S.skipDx=false; S.postAuth='intro';

  goHome();
}

/* ---------- TRANSAÇÕES ---------- */

function renderTxItem(t){
  const c = findCat(t.category_id);
  const card = t.payment_method && t.payment_method!=='pix' && t.payment_method!=='debit' ? findCard(t.payment_method) : null;
  const isIncome = t.type==='income';
  const sign = isIncome?'+':'-';
  const dateLabel = (() => {
    if(!t.date) return '';
    const d = new Date(t.date+'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.floor((today - d)/(1000*60*60*24));
    if(diff===0) return 'hoje';
    if(diff===1) return 'ontem';
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  })();
  const pmLabel = t.payment_method==='pix'?'Pix':t.payment_method==='debit'?'Débito':card?card.name:'';
  const installmentTag = t.installments>1?` · ${t.installments}x`:'';
  return `<div class="list-item tx-action" role="button" tabindex="0" onclick="openModal('editTx','${t.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openModal('editTx','${t.id}')}" title="Editar movimentação">
    <div class="list-icon ${isIncome?'bg-green':''}" style="${!isIncome?`background:${c.color}22`:''}">${displayIcon(c.icon)}</div>
    <div>
      <span class="list-title">${escapeHTML(t.description||'Sem descrição')}</span>
      <span class="list-meta">${escapeHTML(c.name)} · ${escapeHTML(dateLabel)}${pmLabel?' · '+escapeHTML(pmLabel):''}${installmentTag}</span>
    </div>
    <div class="list-amount ${isIncome?'green':'red'}">${sign} ${fmt(t.amount)}</div>
  </div>`;
}

function transactions(){
  const all = [...S.data.transactions].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const cur = currentMonth();
  const sum = monthSummary(cur);
  /* Agrupar por dia */
  const byDay = {};
  all.forEach(t=>{ const d=t.date||'sem-data'; if(!byDay[d])byDay[d]=[]; byDay[d].push(t); });
  const days = Object.keys(byDay).sort().reverse();

  root.innerHTML = `<div class="screen dash"><div class="content">
    <div class="page-head"><div><div class="page-title" style="color:#fff">Transações</div><div class="page-sub">Tudo que entrou e saiu</div></div><button class="icon-btn" onclick="openModal('addTx')">＋</button></div>

    <div class="finance-card">
      <div class="metric-grid">
        <div class="metric"><small class="green">Entrou</small><strong class="green">${fmt(sum.income)}</strong></div>
        <div class="divider"></div>
        <div class="metric"><small class="red">Saiu</small><strong class="red">${fmt(sum.expense)}</strong></div>
      </div>
    </div>

    ${all.length===0 ? `<div class="finance-card"><div class="empty"><div class="empty-icon">${displayIcon('moneyFlow')}</div><h4>Sem transações ainda</h4><p>Comece registrando sua primeira receita ou despesa para ver para onde seu dinheiro vai.</p><button class="btn btn-primary btn-sm" onclick="openModal('addTx')">+ Lançar primeira transação</button></div></div>` :
      days.map(d=>{
        const dayTx = byDay[d];
        const dayLabel = d==='sem-data'?'Sem data':new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
        const dayTotal = dayTx.reduce((acc,t)=>acc + (t.type==='income'?Number(t.amount):-Number(t.amount)),0);
        return `<div class="finance-card">
          <div class="ch-row"><b style="text-transform:capitalize">${escapeHTML(dayLabel)}</b><span class="chip ${dayTotal>=0?'chip-green':'chip-red'}">${dayTotal>=0?'+':''}${fmt(Math.abs(dayTotal))}</span></div>
          ${dayTx.map(renderTxItem).join('')}
        </div>`;
      }).join('')
    }

    <div style="height:14px"></div>
    </div>${tabBar('tx')}</div>`;
}

   MODAIS — formulários
   ============================================================ */

let modalDraft = {};

function openModal(name, ctx){
  S.modal = {name, ctx};
  modalDraft = {};
  /* Preencher draft com defaults conforme contexto */
  if(name==='addTx'){
    modalDraft = {type:'expense', date:todayISO(), payment_method:'pix', installments:1, amount:'', description:'', category_id:''};
  } else if(name==='editTx' && ctx){
    const tx = S.data.transactions.find(x=>x.id===ctx);
    if(tx){
      modalDraft = {
        id: tx.id,
        type: tx.type || 'expense',
        date: tx.date || todayISO(),
        payment_method: tx.payment_method || 'pix',
        installments: tx.installments || 1,
        amount: String(tx.amount || ''),
        description: tx.description || '',
        category_id: tx.category_id || ''
      };
    }
  } else if(name==='addCard'){
    modalDraft = {name:'', bank:'', available_limit:'', closing_day:5, due_day:12, status:'active'};
  } else if(name==='addGoal'){
    modalDraft = {name:'', target_amount:'', current_amount:'', deadline:'', icon:'🎯', color:'#7552FF', status:'active'};
  } else if(name==='goalDetail' && ctx){
    const g = S.data.goals.find(x=>x.id===ctx);
    modalDraft = {goal_id:ctx, contribute:''};
  } else if(name==='addFixedExpense'){
    modalDraft = {name:'', amount:'', category:'cat_outros', type:'monthly', due_day:5, status:'active'};
  } else if(name==='addFixedIncome'){
    modalDraft = {name:'', amount:'', category:'cat_salario', type:'fixed', pay_day:5, status:'active'};
  } else if(name==='addCategory'){
    modalDraft = {name:'', icon:'🏷️', color:'#7552FF', type:'expense'};
  }
  render();
}
function closeModal(){S.modal=null;modalDraft={};render()}

function renderModal(){
  const wrap = document.createElement('div');
  wrap.className = 'modal-back';
  wrap.onclick = (e)=>{ if(e.target===wrap) closeModal(); };
  let inner = '';
  switch(S.modal.name){
    case 'addTx': inner = modalAddTx(); break;
    case 'editTx': inner = modalAddTx(true); break;
    case 'addCard': inner = modalAddCard(); break;
    case 'cardDetail': inner = modalCardDetail(S.modal.ctx); break;
    case 'addGoal': inner = modalAddGoal(); break;
    case 'goalDetail': inner = modalGoalDetail(S.modal.ctx); break;
    case 'addFixedExpense': inner = modalAddFixedExpense(); break;
    case 'addFixedIncome': inner = modalAddFixedIncome(); break;
    case 'addCategory': inner = modalAddCategory(); break;
  }
  wrap.innerHTML = `<div class="modal" onclick="event.stopPropagation()"><div class="modal-grip"></div>${inner}</div>`;
  document.querySelector('.app').appendChild(wrap);
}

/* ---------- MODAL: Lançar transação ---------- */
function modalAddTx(isEdit=false){

    {id:'pix',label:'Pix'},
    {id:'debit',label:'Débito'},

      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" placeholder="0,00" oninput="modalDraft.amount=this.value" value="${modalDraft.amount||''}"></div>
      <div class="field"><label>Data</label><input type="date" oninput="modalDraft.date=this.value" value="${modalDraft.date||todayISO()}"></div>
    </div>
    <div class="field"><label>Categoria</label>
      <div class="pill-row">${cats.map(c=>`<button class="${modalDraft.category_id===c.id?'on':''}" onclick="modalDraft.category_id='${c.id}';render()">${displayIcon(c.icon,'xs')} ${escapeHTML(c.name)}</button>`).join('')}</div>
    </div>
    ${!isIncome?`<div class="field"><label>Pagamento</label>
      <select onchange="modalDraft.payment_method=this.value;modalDraft.installments=1;render()">
        ${paymentOptions.map(p=>`<option value="${p.id}" ${modalDraft.payment_method===p.id?'selected':''}>${escapeHTML(p.label)}</option>`).join('')}

    </div>${modalDraft.payment_method && modalDraft.payment_method!=='pix' && modalDraft.payment_method!=='debit' ? `<div class="field"><label>Parcelas</label><div class="pill-row">${[1,2,3,4,5,6,8,10,12].map(n=>`<button class="${modalDraft.installments===n?'on':''}" onclick="modalDraft.installments=${n};render()">${n}x</button>`).join('')}</div></div>`:''}`:''}
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveTx()">${isEdit?'Salvar alterações':'Salvar transação'}</button>
      ${isEdit?`<button class="btn btn-danger" onclick="deleteTx('${modalDraft.id}')">Excluir movimentação</button>`:''}

    </div>`;
}

function maybeAutoCategory(){
  if(modalDraft.category_id) return;
  const cat = suggestCategoryByDescription(modalDraft.description, modalDraft.type);
  if(cat){ modalDraft.category_id = cat; render(); }
}

function saveTx(){
  if(!modalDraft.description){showToast('Adicione uma descrição');return}
  if(!modalDraft.amount || Number(modalDraft.amount)<=0){showToast('Valor precisa ser maior que zero');return}
  if(!modalDraft.category_id){
    /* fallback automatico */
    modalDraft.category_id = modalDraft.type==='income'?'cat_outras_receitas':'cat_outros';
  }
  const payload = {
    description: modalDraft.description,
    amount: Number(modalDraft.amount),
    date: modalDraft.date || todayISO(),
    type: modalDraft.type,
    category_id: modalDraft.category_id,
    payment_method: modalDraft.type==='income' ? null : (modalDraft.payment_method||'pix'),
    installments: modalDraft.type==='income' ? 1 : (Number(modalDraft.installments)||1)
  };

  if(S.modal && S.modal.name==='editTx' && modalDraft.id){
    const idx = S.data.transactions.findIndex(t=>t.id===modalDraft.id);
    if(idx>=0){
      S.data.transactions[idx] = {...S.data.transactions[idx], ...payload};
      closeModal();
      showToast('Movimentação atualizada');
      return;
    }
  }

  S.data.transactions.push({id: uid(), ...payload});
  closeModal();
  showToast('Transação registrada ✨');
}

function deleteTx(id){
  const tx = S.data.transactions.find(t=>t.id===id);
  if(!tx){showToast('Movimentação não encontrada');return}
  const ok = confirm('Excluir esta movimentação?');
  if(!ok) return;
  S.data.transactions = S.data.transactions.filter(t=>t.id!==id);
  closeModal();
  showToast('Movimentação excluída');
}

<script>
/* ============================================================
   V17 Prisma: cartões + recorrências flexíveis
   Regra de produto:
   1. Cartão tem nome e limite total.
   2. Receitas e despesas podem ser únicas, variáveis ou fixas.
   3. Fixas e variáveis podem ser sem término ou até um mês específico.
   4. Projeção usa apenas recorrências planejadas, não mistura com transações manuais.
   ============================================================ */
function normalizePlannedItem(item, nature){
  const cur = currentMonth();
  let type = item.type || item.kind || 'fixed';
  if(type === 'monthly') type = 'fixed';
  if(type === 'recurring') type = 'fixed';
  if(type === 'single') type = 'one_time';
  const start = item.start_month || item.month || item.occurs_month || cur;
  return {
    ...item,
    type,
    start_month: start,
    occurs_month: item.occurs_month || item.month || start,
    end_month: item.end_month || '',
    category: item.category || (nature==='income' ? 'cat_salario' : 'cat_outros'),
    status: item.status || 'active'
  };
}
function plannedTypeLabel(type){
  return ({fixed:'Fixa', variable:'Variável', one_time:'Pontual', monthly:'Fixa'})[type] || 'Fixa';
}
function plannedPeriodLabel(item, nature){
  const it = normalizePlannedItem(item, nature);
  const day = nature==='income' ? (it.pay_day||5) : (it.due_day||5);
  if(it.type === 'one_time') return `Pontual · ${it.occurs_month || it.start_month}`;
  if(it.type === 'variable') return `Variável · estimativa para ${it.occurs_month || it.start_month}`;
  const end = it.end_month ? `até ${it.end_month}` : 'sem data final';
  return `Fixa · todo dia ${day} · ${end}`;
}
function plannedItemAppliesToMonth(item, key, nature){
  const it = normalizePlannedItem(item, nature);
  if(it.status === 'inactive') return false;
  if(it.type === 'one_time' || it.type === 'variable') return (it.occurs_month || it.start_month) === key;
  if(key < (it.start_month || currentMonth())) return false;
  if(it.end_month && key > it.end_month) return false;
  return true;
}

function projectMonth(key){
  let income = 0, expense = 0;
  S.data.fixedIncomes.filter(f=>plannedItemAppliesToMonth(f,key,'income')).forEach(f=>{ income += Number(f.amount||0); });
  S.data.fixedExpenses.filter(f=>plannedItemAppliesToMonth(f,key,'expense')).forEach(f=>{ expense += Number(f.amount||0); });
  S.data.creditCards.filter(c=>c.status!=='inactive').forEach(c=>{ expense += ccInvoice(c.id, key); });
  return {income, expense, balance: income-expense};
}

function openModal(name, ctx){
  S.modal = {name, ctx};
  modalDraft = {};
  const cur = currentMonth();
  if(name==='addTx'){
    modalDraft = {type:'expense', date:todayISO(), payment_method:'pix', installments:1, amount:'', description:'', category_id:''};
  } else if(name==='editTx' && ctx){
    const tx = S.data.transactions.find(x=>x.id===ctx);
    if(tx){
      modalDraft = {id:tx.id,type:tx.type||'expense',date:tx.date||todayISO(),payment_method:tx.payment_method||'pix',installments:tx.installments||1,amount:String(tx.amount||''),description:tx.description||'',category_id:tx.category_id||''};
    }
  } else if(name==='addCard'){
    modalDraft = {name:'', bank:'', available_limit:'', closing_day:5, due_day:12, status:'active'};
  } else if(name==='addGoal'){
    modalDraft = {name:'', target_amount:'', current_amount:'', deadline:'', icon:'target', color:'#7552FF', status:'active'};
  } else if(name==='goalDetail' && ctx){
    modalDraft = {goal_id:ctx, contribute:''};
  } else if(name==='addFixedExpense'){
    modalDraft = {name:'', amount:'', category:'cat_outros', type:'fixed', due_day:5, start_month:cur, occurs_month:cur, end_month:'', status:'active'};
  } else if(name==='addFixedIncome'){
    modalDraft = {name:'', amount:'', category:'cat_salario', type:'fixed', pay_day:5, start_month:cur, occurs_month:cur, end_month:'', status:'active'};
  } else if(name==='addCategory'){
    modalDraft = {name:'', icon:'tag', color:'#7552FF', type:'expense'};
  }
  render();
}

function setPlanType(type){
  const cur = currentMonth();
  modalDraft.type = type;
  if(type==='fixed'){
    modalDraft.start_month = modalDraft.start_month || cur;
    modalDraft.occurs_month = modalDraft.occurs_month || cur;
  } else {
    modalDraft.occurs_month = modalDraft.occurs_month || modalDraft.start_month || cur;
    modalDraft.start_month = modalDraft.occurs_month;
    modalDraft.end_month = '';
  }
  render();
}

function planTypeCards(nature){
  const type = modalDraft.type || 'fixed';
  const word = nature==='income' ? 'receita' : 'despesa';
  const items = [
    {id:'fixed', icon:nature==='income'?'briefcase':'receipt', title:'Fixa', desc:'Todo mês, no mesmo valor'},
    {id:'variable', icon:nature==='income'?'coins':'activity', title:'Variável', desc:nature==='income'?'Muda conforme o mês':'Pode mudar de um mês para outro'},
    {id:'one_time', icon:'calendar', title:'Pontual', desc:'Acontece uma única vez'}
  ];
  return `<div class="field"><label>Tipo de ${word}</label><div class="plan-type-grid">${items.map(item=>`<button type="button" class="plan-type-card ${type===item.id?'on':''}" onclick="setPlanType('${item.id}')">
    <span class="plan-type-icon">${displayIcon(item.icon,'sm')}</span>
    <span><span class="plan-type-title">${item.title}</span><span class="plan-type-desc">${item.desc}</span></span>
    <span class="plan-type-check">${type===item.id?'✓':''}</span>
  </button>`).join('')}</div><div class="plan-help">Escolha como esse valor deve entrar na sua projeção. Isso não cria uma transação automática.</div></div>`;
}

function recurrenceFields(kind, nature){
  const dayLabel = nature==='income' ? 'Dia de recebimento' : 'Dia de vencimento';
  const dayKey = nature==='income' ? 'pay_day' : 'due_day';
  const dayVal = modalDraft[dayKey] || 5;
  if(kind === 'one_time'){
    return `<div class="field"><label>Mês da ocorrência</label><input type="month" oninput="modalDraft.occurs_month=this.value;modalDraft.start_month=this.value" value="${modalDraft.occurs_month||modalDraft.start_month||currentMonth()}"></div>`;
  }
  if(kind === 'variable'){
    return `<div class="field"><label>Mês de referência</label><input type="month" oninput="modalDraft.occurs_month=this.value;modalDraft.start_month=this.value" value="${modalDraft.occurs_month||modalDraft.start_month||currentMonth()}"></div>
    <div class="note"><b>Valor variável é uma previsão.</b><br>Use quando o valor muda de mês para mês. Quando acontecer de verdade, registre em Movimentar.</div>`;
  }
  return `<div class="field-row">
    <div class="field"><label>${dayLabel}</label><input type="number" min="1" max="31" oninput="modalDraft.${dayKey}=Number(this.value)" value="${dayVal}"></div>
    <div class="field"><label>Começa em</label><input type="month" oninput="modalDraft.start_month=this.value" value="${modalDraft.start_month||currentMonth()}"></div>
  </div>
  <div class="field"><label>Até quando?</label>
    <div class="toggle"><button class="${!modalDraft.end_month?'on':''}" onclick="modalDraft.end_month='';render()">Sem data final</button><button class="${modalDraft.end_month?'on':''}" onclick="modalDraft.end_month=modalDraft.end_month||currentMonth();render()">Até um mês específico</button></div>
  </div>
  ${modalDraft.end_month?`<div class="field"><label>Último mês</label><input type="month" oninput="modalDraft.end_month=this.value" value="${modalDraft.end_month}"></div>`:''}`;
}

function modalAddFixedExpense(){
  const cats = S.data.categories.filter(c=>c.type==='expense');
  const type = modalDraft.type || 'fixed';
  const valueLabel = type==='fixed' ? 'Valor mensal (R$)' : type==='variable' ? 'Valor estimado no mês (R$)' : 'Valor pontual (R$)';
  return `<h3>Nova despesa</h3><p class="sub">Planeje seus gastos sem misturar com movimentações já realizadas.</p>
    <div class="field"><label>Nome da despesa</label><input type="text" placeholder="Ex: Aluguel, mercado, IPTU..." oninput="modalDraft.name=this.value" value="${escapeHTML(modalDraft.name||'')}"></div>
    ${planTypeCards('expense')}
    <div class="field"><label>${valueLabel}</label><input type="number" step="0.01" placeholder="0,00" oninput="modalDraft.amount=this.value" value="${modalDraft.amount||''}"></div>
    ${recurrenceFields(type,'expense')}
    <div class="field"><label>Categoria</label><div class="pill-row">${cats.map(c=>`<button class="${modalDraft.category===c.id?'on':''}" onclick="modalDraft.category='${c.id}';render()">${displayIcon(c.icon,'xs')} ${escapeHTML(c.name)}</button>`).join('')}</div></div>
    <div class="note"><b>Atenção:</b> isso é planejamento. Ele aparece apenas no futuro previsto. Quando o gasto acontecer, registre em Movimentar.</div>
    <button class="btn btn-primary" onclick="saveFixedExpense()">Salvar despesa planejada</button>
    <button class="btn ghost" onclick="closeModal()">Cancelar</button>`;
}

function saveFixedExpense(){
  if(!modalDraft.name){showToast('Nome é obrigatório');return}
  if(!modalDraft.amount || Number(modalDraft.amount)<=0){showToast('Informe o valor');return}
  const type = modalDraft.type || 'fixed';
  const isMonthBased = type==='one_time' || type==='variable';
  const start = isMonthBased ? (modalDraft.occurs_month||modalDraft.start_month||currentMonth()) : (modalDraft.start_month||currentMonth());
  S.data.fixedExpenses.push({
    id:uid(), name:modalDraft.name, amount:Number(modalDraft.amount),
    category:modalDraft.category||'cat_outros', type,
    due_day:Number(modalDraft.due_day||5),
    start_month:start, occurs_month:isMonthBased?start:'', end_month:isMonthBased?'':(modalDraft.end_month||''),
    status:'active'
  });
  closeModal();
  showToast(type==='one_time'?'Despesa pontual cadastrada':type==='variable'?'Despesa variável cadastrada':'Despesa fixa cadastrada');
}

function modalAddFixedIncome(){
  const cats = S.data.categories.filter(c=>c.type==='income');
  const type = modalDraft.type || 'fixed';
  const valueLabel = type==='fixed' ? 'Valor mensal (R$)' : type==='variable' ? 'Valor estimado no mês (R$)' : 'Valor pontual (R$)';
  return `<h3>Nova receita</h3><p class="sub">Organize suas entradas futuras sem misturar previsão com dinheiro já recebido.</p>
    <div class="field"><label>Nome da receita</label><input type="text" placeholder="Ex: Salário, bônus, freela..." oninput="modalDraft.name=this.value" value="${escapeHTML(modalDraft.name||'')}"></div>
    ${planTypeCards('income')}
    <div class="field"><label>${valueLabel}</label><input type="number" step="0.01" placeholder="0,00" oninput="modalDraft.amount=this.value" value="${modalDraft.amount||''}"></div>
    ${recurrenceFields(type,'income')}
    <div class="field"><label>Categoria</label><div class="pill-row">${cats.map(c=>`<button class="${modalDraft.category===c.id?'on':''}" onclick="modalDraft.category='${c.id}';render()">${displayIcon(c.icon,'xs')} ${escapeHTML(c.name)}</button>`).join('')}</div></div>
    <div class="note"><b>Atenção:</b> isso é planejamento. Ele aparece apenas no futuro previsto. Quando o dinheiro entrar, registre em Movimentar.</div>
    <button class="btn btn-primary" onclick="saveFixedIncome()">Salvar receita planejada</button>
    <button class="btn ghost" onclick="closeModal()">Cancelar</button>`;
}

function saveFixedIncome(){
  if(!modalDraft.name){showToast('Nome é obrigatório');return}
  if(!modalDraft.amount || Number(modalDraft.amount)<=0){showToast('Informe o valor');return}
  const type = modalDraft.type || 'fixed';
  const isMonthBased = type==='one_time' || type==='variable';
  const start = isMonthBased ? (modalDraft.occurs_month||modalDraft.start_month||currentMonth()) : (modalDraft.start_month||currentMonth());
  S.data.fixedIncomes.push({
    id:uid(), name:modalDraft.name, amount:Number(modalDraft.amount),
    category:modalDraft.category||'cat_salario', type,
    pay_day:Number(modalDraft.pay_day||5),
    start_month:start, occurs_month:isMonthBased?start:'', end_month:isMonthBased?'':(modalDraft.end_month||''),
    status:'active'
  });
  closeModal();
  showToast(type==='one_time'?'Receita pontual cadastrada':type==='variable'?'Receita variável cadastrada':'Receita fixa cadastrada');
}

function fixedExpenses(){
  const list = S.data.fixedExpenses.map(e=>normalizePlannedItem(e,'expense'));
  const totalProjected = list.filter(e=>plannedItemAppliesToMonth(e,currentMonth(),'expense')).reduce((a,b)=>a+Number(b.amount||0),0);
  root.innerHTML = `<div class="screen dash"><div class="content">
    <div class="page-head"><div><div class="page-title" style="color:#fff">Despesas planejadas</div><div class="page-sub">Fixas, variáveis e únicas</div></div><button class="icon-btn" onclick="openModal('addFixedExpense')">＋</button></div>
    <div class="finance-card"><div class="ch-row"><b>Impacto previsto neste mês</b><span class="chip chip-red">${fmt(totalProjected)}</span></div><p class="sub">Esses valores aparecem só na projeção. Eles não viram movimentação até você registrar em Movimentar.</p></div>
    ${list.length===0 ? `<div class="finance-card"><div class="empty"><div class="empty-icon">${displayIcon('receipt')}</div><h4>Nenhuma despesa planejada</h4><p>Cadastre aluguel, contas, despesas variáveis ou gastos únicos para enxergar o futuro com mais clareza.</p><button class="btn btn-primary btn-sm" onclick="openModal('addFixedExpense')">+ Adicionar primeira</button></div></div>` :
      `<div class="finance-card">${list.map(e=>`<div class="list-item">
        <div class="list-icon bg-red">${displayIcon(e.type==='one_time'?'calendar':e.type==='variable'?'activity':'receipt')}</div>
        <div><span class="list-title">${escapeHTML(e.name)}</span><span class="list-meta">${escapeHTML(plannedPeriodLabel(e,'expense'))}</span></div>
        <div class="list-amount red">${fmt(e.amount)}</div>
      </div>`).join('')}</div>`}
    <div style="height:14px"></div>
    </div>${tabBar('more')}</div>`;
}

function fixedIncomes(){
  const list = S.data.fixedIncomes.map(e=>normalizePlannedItem(e,'income'));
  const totalProjected = list.filter(e=>plannedItemAppliesToMonth(e,currentMonth(),'income')).reduce((a,b)=>a+Number(b.amount||0),0);
  root.innerHTML = `<div class="screen dash"><div class="content">
    <div class="page-head"><div><div class="page-title" style="color:#fff">Receitas planejadas</div><div class="page-sub">Fixas, variáveis e únicas</div></div><button class="icon-btn" onclick="openModal('addFixedIncome')">＋</button></div>
    <div class="finance-card"><div class="ch-row"><b>Entrada prevista neste mês</b><span class="chip chip-green">${fmt(totalProjected)}</span></div><p class="sub">Esses valores aparecem só na projeção. Eles não viram movimentação até você registrar em Movimentar.</p></div>
    ${list.length===0 ? `<div class="finance-card"><div class="empty"><div class="empty-icon">${displayIcon('briefcase')}</div><h4>Nenhuma receita planejada</h4><p>Cadastre salário, freelas, renda variável ou entradas únicas para o Prisma calcular sua sobra provável.</p><button class="btn btn-primary btn-sm" onclick="openModal('addFixedIncome')">+ Adicionar primeira</button></div></div>` :
      `<div class="finance-card">${list.map(e=>`<div class="list-item">
        <div class="list-icon bg-green">${displayIcon(e.type==='one_time'?'calendar':e.type==='variable'?'coins':'briefcase')}</div>
        <div><span class="list-title">${escapeHTML(e.name)}</span><span class="list-meta">${escapeHTML(plannedPeriodLabel(e,'income'))}</span></div>
        <div class="list-amount green">${fmt(e.amount)}</div>
      </div>`).join('')}</div>`}
    <div style="height:14px"></div>
    </div>${tabBar('more')}</div>`;
}

/* Atualiza a tela atual depois que os overrides carregam */
if(typeof render === 'function') render();
</script>
